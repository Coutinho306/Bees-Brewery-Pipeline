[pytest]
# Pytest configuration for BEES Breweries Case

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers

# Markers for organizing tests
markers =
    unit: Unit tests for individual components
    integration: Integration tests for DAGs
    quality: Data quality validation tests
